<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f1ebdf">
<title>Marathon Training</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #app-frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  #coach-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2147483647;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
    transition: transform .15s;
  }
  #coach-btn:hover { transform: scale(1.08); }
  #coach-panel {
    position: fixed;
    bottom: 82px;
    right: 24px;
    width: 310px;
    max-height: 440px;
    background: #faf9f5;
    border-radius: 14px;
    border: 1px solid #e8e4dc;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
    flex-direction: column;
    z-index: 2147483647;
    overflow: hidden;
    display: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #coach-panel.open { display: flex; }
  #c-hdr {
    background: #faf9f5;
    border-bottom: 1px solid #e8e4dc;
    padding: 12px 14px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #c-lbl { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #999; margin-bottom: 2px; }
  #c-ttl { color: #1a1a1a; font-weight: 600; font-size: 13px; }
  #c-x { background: none; border: none; color: #999; font-size: 18px; cursor: pointer; padding: 2px 5px; border-radius: 4px; line-height: 1; }
  #c-x:hover { background: #eee; }
  #c-msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  #c-chips { padding: 0 12px 8px; display: flex; flex-wrap: wrap; gap: 4px; flex-shrink: 0; }
  #c-foot { padding: 9px 12px; border-top: 1px solid #e8e4dc; display: flex; gap: 6px; align-items: center; background: #faf9f5; flex-shrink: 0; }
  .cmsg { display: flex; gap: 6px; }
  .cmsg.u { flex-direction: row-reverse; }
  .cbbl { padding: 8px 11px; border-radius: 12px; font-size: 12.5px; line-height: 1.5; max-width: 86%; white-space: pre-wrap; }
  .cmsg.b .cbbl { background: #fff; color: #2a2a2a; border: 1px solid #e8e4dc; border-bottom-left-radius: 3px; }
  .cmsg.u .cbbl { background: #1a1a1a; color: #fff; border-bottom-right-radius: 3px; }
  .cico { width: 22px; height: 22px; border-radius: 50%; background: #f0ede8; border: 1px solid #e8e4dc; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
  .cchip { background: #fff; color: #555; border: 1px solid #e0dcd5; border-radius: 20px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  .cchip:hover { background: #f0ede8; }
  #c-inp { flex: 1; background: #fff; border: 1px solid #e0dcd5; border-radius: 18px; padding: 7px 12px; color: #1a1a1a; font-size: 12.5px; outline: none; font-family: inherit; }
  #c-inp:focus { border-color: #999; }
  #c-inp::placeholder { color: #aaa; }
  #c-snd { width: 30px; height: 30px; border-radius: 50%; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #c-snd:hover { background: #333; }
</style>
</head>
<body>

<iframe id="app-frame" src="app.html" title="Marathon Training App"></iframe>

<button id="coach-btn" title="Ask your coach">
  <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
  </svg>
</button>

<div id="coach-panel">
  <div id="c-hdr">
    <div>
      <div id="c-lbl">NYC 2026</div>
      <div id="c-ttl">Training Coach</div>
    </div>
    <button id="c-x">&times;</button>
  </div>
  <div id="c-msgs"></div>
  <div id="c-chips">
    <span class="cchip">Where do training principles come from?</span>
    <span class="cchip">When should I take gels?</span>
    <span class="cchip">Why two 20-milers?</span>
    <span class="cchip">What is a tempo run?</span>
  </div>
  <div id="c-foot">
    <input id="c-inp" placeholder="Ask your coach..." />
    <button id="c-snd">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="white">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  var QA = [
    {k:['principle','philosophy','where.*come','method','hansons','higdon','pfitzinger','canova','80.20','nick bear','methodology'],
     a:'This plan blends four elite methodologies:\n\nHal Higdon \u2014 10% mileage increase rule, recovery weeks every 3-4 weeks\nHansons Method \u2014 Two 20-milers to simulate race-day fatigue\nPfitzinger \u2014 Periodization phases, 40+ mile peak weeks\nRenato Canova \u2014 Race-pace miles at end of long runs (weeks 14-20)\nMatt Fitzgerald (80/20) \u2014 ~80% easy Zone 2, 20% quality work\nNick Bear \u2014 Integrating strength training with marathon prep'},
    {k:['gel','fuel','nutrition','eat','carb','maurten','gu','when.*take'],
     a:'Fueling rules:\n\nUnder 60 min: water only\n60-75 min: optional gel at 45 min\n75+ min: gel every 40-45 min starting mile 5-6\n\nRace day: gels at miles 5, 10, 15, 20\n\nPractice this EXACT schedule on long runs.'},
    {k:['20.mile','twenty','two 20','20-miler','longest run'],
     a:'You have TWO 20-milers \u2014 intentional Hansons-style:\n\nWeek 16 (Aug 17): First 20-miler. Start slow. Just finish.\nWeek 18 (Aug 31): Second 20-miler. Focus on negative splits.\n\nWhy two? Builds confidence \u2014 by race day 26.2 won\'t feel foreign.'},
    {k:['tempo','threshold','wednesday','comfortably hard'],
     a:'Tempo runs start Wednesday Week 6 (Jun 8).\n\nStructure: 1-2mi warmup \u2192 middle miles at 8:30-9:00/mi \u2192 1mi cooldown\n\nEffort: 7/10, comfortably hard. Raises lactate threshold \u2014 #1 predictor of marathon performance.'},
    {k:['stride','20 second','6.*stride'],
     a:'Strides on Thursdays starting Week 14 (Aug 3).\n\n6 x 20-sec at ~7:30-8:00/mi:\n5-sec buildup \u2192 hold 10 sec \u2192 ease 5 sec\n60-90 sec walk rest between each'},
    {k:['recover','recovery week','cut back'],
     a:'Recovery weeks: 5, 9, 13, 17, 21 \u2014 every 3-4 weeks.\n\nMileage drops 20-25%, all runs easy, no tempo.\n\nYour body adapts DURING recovery, not during hard weeks.'},
    {k:['taper','week 22','week 23','week 24','week 25','week 26','race week'],
     a:'Taper starts Week 22 (Sep 28):\n\nWk 22: 35mi \u2192 Wk 23: 28mi \u2192 Wk 24: 22mi \u2192 Wk 25: 16mi \u2192 Wk 26: 10mi\n\nTaper anxiety is normal. Sleep 9hrs/night. No new foods or gear.'},
    {k:['lift','strength','weight','squat','deadlift','gym'],
     a:'Strength in 3 phases:\n\nPhase 1 (Wks 1-9): Heavy, 3-5x6-8 reps\nPhase 2 (Wks 10-20): Moderate, 3x10-12 reps\nPhase 3 (Wks 21-26): Light maintenance\n\nAlways lift AFTER your run, or 6+ hours apart.'},
    {k:['pace','9:09','sub.4','goal pace','split','4 hour','3:59'],
     a:'Goal: 9:09/mile for 3:59:59\n\nKey splits:\nMile 5: 0:45:45\nMile 10: 1:31:30\nHalf: 2:00:00\nMile 20: 3:03:00\nFinish: 3:59:59'},
    {k:['nyc','new york','course','race day','central park','verrazano','brooklyn','queens'],
     a:'NYC Marathon \u2014 Nov 1, 2026:\n\nRoute: Staten Island \u2192 Brooklyn \u2192 Queens \u2192 Bronx \u2192 Manhattan \u2192 Central Park\n\nMile 1: Verrazano Bridge \u2014 go easy uphill!\nMile 15: Queensboro Bridge \u2014 mentally tough\nMile 16: First Ave \u2014 massive crowd energy\nMiles 23-26: Central Park hills \u2014 hardest when most tired'},
    {k:['mileage','miles.*week','peak','weekly'],
     a:'Base (Wks 1-5): 15-22mi/wk\nBuild (Wks 6-13): 25-35mi/wk\nPeak (Wks 14-20): 37-43mi/wk\nTaper (Wks 21-26): 35\u219210mi/wk'},
    {k:['long run','saturday','sunday'],
     a:'Long runs Saturdays. Wks 14-20: last 2mi at race pace (9:09/mi). Keep effort conversational 10:00-10:45/mi.'},
    {k:['injury','hurt','miss','sore','knee','pain','skip'],
     a:'Missed training:\n1-2 runs: resume normally\nFull week: return at 70% mileage\n2 weeks: drop back 2 weeks in plan\nMinor injury: cross-train at same effort'},
    {k:['heat','summer','hot','humidity','july','august'],
     a:'Summer running tips:\n\nAdd 30-45 sec/mi in heat above 70F\nRun early morning (5-7am) or after sunset\nCarry water on any run over 45 min\nShorten runs if heat index above 85F\nAcclimate over 2-3 weeks \u2014 pace will come back'}
  ];

  function ans(q) {
    var ql = q.toLowerCase(), best = null, top = 0;
    for (var i = 0; i < QA.length; i++) {
      var score = 0;
      for (var j = 0; j < QA[i].k.length; j++) {
        try { if (new RegExp(QA[i].k[j],'i').test(ql)) score++; }
        catch(e) { if (ql.indexOf(QA[i].k[j]) !== -1) score++; }
      }
      if (score > top) { top = score; best = QA[i]; }
    }
    return top > 0 ? best.a : 'Ask me about training principles, gel timing, tempo runs, strides, 20-milers, taper, race pacing, or strength!';
  }

  var panelOpen = false, greeted = false;

  function addMsg(text, role) {
    var msgs = document.getElementById('c-msgs');
    var row = document.createElement('div');
    row.className = 'cmsg ' + (role === 'bot' ? 'b' : 'u');
    var ico = document.createElement('div');
    ico.className = 'cico';
    ico.textContent = role === 'bot' ? '\uD83C\uDFC3' : '\uD83D\uDC64';
    var bbl = document.createElement('div');
    bbl.className = 'cbbl';
    bbl.textContent = text;
    row.appendChild(ico);
    row.appendChild(bbl);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    document.getElementById('c-chips').style.display = 'none';
  }

  function send() {
    var inp = document.getElementById('c-inp');
    var q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    addMsg(q, 'user');
    var reply = ans(q);
    setTimeout(function() { addMsg(reply, 'bot'); }, 220);
  }

  function toggle() {
    panelOpen = !panelOpen;
    document.getElementById('coach-panel').classList.toggle('open', panelOpen);
    if (panelOpen && !greeted) {
      greeted = true;
      addMsg('Hey Magnum! Ask me anything about your NYC 2026 training plan \u2014 pacing, nutrition, strength, the science behind the workouts, or any specific week.', 'bot');
    }
    if (panelOpen) setTimeout(function() { document.getElementById('c-inp').focus(); }, 50);
  }

  document.getElementById('coach-btn').addEventListener('click', toggle);
  document.getElementById('c-x').addEventListener('click', function() {
    panelOpen = false;
    document.getElementById('coach-panel').classList.remove('open');
  });
  document.getElementById('c-snd').addEventListener('click', send);
  document.getElementById('c-inp').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') send();
  });

  var chips = document.querySelectorAll('.cchip');
  for (var i = 0; i < chips.length; i++) {
    (function(chip) {
      chip.addEventListener('click', function() {
        document.getElementById('c-inp').value = chip.textContent;
        send();
      });
    })(chips[i]);
  }
})();
</script>

</body>
</html>
